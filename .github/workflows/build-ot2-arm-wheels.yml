name: Build OT-2 ARM Wheels

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['*']
    paths:
      - 'Dockerfile.build'
      - 'Dockerfile.build.py312'
      - 'pyproject.toml'
      - 'src/**'

jobs:
  # Old OT-2: Python 3.10, Debian-based, glibc 2.25.
  # Compiles grpcio, numpy, gpiod from source on Debian Stretch (glibc 2.24).
  build-ot2-arm-wheels-py310:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM wheel image (py310)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.build
          platforms: linux/arm/v7
          load: true
          tags: ot2-wheel-builder-py310
          target: builder
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build connector executable
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.build
          platforms: linux/arm/v7
          load: true
          tags: ot2-exe-builder
          target: pyinstaller-builder
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract wheels
        run: |
          id=$(docker create ot2-wheel-builder-py310)
          docker cp $id:/output dist_arm
          docker rm $id
          ls -la dist_arm/

      - name: Extract connector binary
        run: |
          mkdir -p dist_connector
          id=$(docker create ot2-exe-builder)
          docker cp $id:/exe-output/connector dist_connector/connector
          docker rm $id
          cp config/ot2_config.json dist_connector/ot2_config.json
          ls -la dist_connector/

      - name: Smoke-test connector binary (py310)
        run: docker run --rm --platform linux/arm/v7 ot2-exe-builder /exe-output/connector --help

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: ot2-arm-wheels-py310
          path: dist_arm/
          retention-days: 28

      - name: Upload connector artifact (py310)
        uses: actions/upload-artifact@v4
        with:
          name: ot2-connector-arm-py310
          path: dist_connector/
          retention-days: 28

  # New OT-2: Python 3.12, Buildroot, glibc 2.40.
  # No compilation needed — grpcio has a native cp312/linux_armv7l PyPI wheel.
  # opentrons, numpy, gpiod come from the robot system via --system-site-packages.
  build-ot2-arm-wheels-py312:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ARM wheel image (py312)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.build.py312
          platforms: linux/arm/v7
          load: true
          tags: ot2-wheel-builder-py312
          target: builder
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build connector executable (py312)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.build.py312
          platforms: linux/arm/v7
          load: true
          tags: ot2-exe-builder-py312
          target: pyinstaller-builder
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract wheels
        run: |
          id=$(docker create ot2-wheel-builder-py312)
          docker cp $id:/output dist_arm_py312
          docker rm $id
          ls -la dist_arm_py312/

      - name: Extract connector binary (py312)
        run: |
          mkdir -p dist_connector_py312
          id=$(docker create ot2-exe-builder-py312)
          docker cp $id:/exe-output/connector dist_connector_py312/connector
          docker rm $id
          cp config/ot2_config.json dist_connector_py312/ot2_config.json
          ls -la dist_connector_py312/

      - name: Smoke-test connector binary (py312)
        run: docker run --rm --platform linux/arm/v7 ot2-exe-builder-py312 /exe-output/connector --help

      - name: Upload wheels artifact
        uses: actions/upload-artifact@v4
        with:
          name: ot2-arm-wheels-py312
          path: dist_arm_py312/
          retention-days: 28

      - name: Upload connector artifact (py312)
        uses: actions/upload-artifact@v4
        with:
          name: ot2-connector-arm-py312
          path: dist_connector_py312/
          retention-days: 28

  # Publishes both wheel sets to a rolling "ot2-latest" release so scripts/setup_ot2.sh
  # can download them with plain curl -- no gh CLI / auth token needed on the dev
  # machine, since (unlike workflow artifacts) public-repo release assets are
  # downloadable unauthenticated.
  publish-release:
    needs: [build-ot2-arm-wheels-py310, build-ot2-arm-wheels-py312]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ot2-arm-wheels-py310
          path: dist_arm

      - uses: actions/download-artifact@v4
        with:
          name: ot2-arm-wheels-py312
          path: dist_arm_py312

      - name: Zip wheel sets
        run: |
          (cd dist_arm && zip -r ../ot2-arm-wheels-py310.zip .)
          (cd dist_arm_py312 && zip -r ../ot2-arm-wheels-py312.zip .)

      - name: Publish/update rolling release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ot2-latest
          name: "OT-2 ARM wheels (latest main)"
          body: "Automatically updated on every push to main. Built from ${{ github.sha }}."
          make_latest: true
          files: |
            ot2-arm-wheels-py310.zip
            ot2-arm-wheels-py312.zip
