name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Old OT-2: Python 3.10, opentrons 8.8.1 (Debian-based, glibc 2.25)
          - python-version: "3.10"
            opentrons-version: "8.8.1"
          # New OT-2: Python 3.12, opentrons 9.0.0 (Buildroot, glibc 2.40)
          - python-version: "3.12"
            opentrons-version: "9.0.0"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.6"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (opentrons ${{ matrix.opentrons-version }})
        run: |
          uv sync --all-extras
          if [ "${{ matrix.opentrons-version }}" != "8.8.1" ]; then
            uv pip install "opentrons==${{ matrix.opentrons-version }}"
          fi

      - name: Lint
        run: uv run ruff check src

      - name: Format
        run: uv run ruff format --check src

      - name: Test (unit + gRPC simulator)
        run: uv run pytest --cov=src --cov-report=term --cov-report=xml --junit-xml=junit.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

      # ── HTTP + gRPC integration against the simulator ──────────────────────
      # robot_server and server_utils are not on PyPI; install them directly from
      # the opentrons monorepo at the matching release tag.  --no-deps skips the
      # opentrons==0.0.0 monorepo-internal version constraint; opentrons is already
      # installed above.  Pin fastapi/uvicorn/pydantic-settings to the exact versions
      # robot_server expects to avoid upgrades that break its internal APIs.
      - name: Install opentrons robot-server ${{ matrix.opentrons-version }}
        run: |
          uv pip install --no-deps \
            "robot_server @ git+https://github.com/Opentrons/opentrons.git@v${{ matrix.opentrons-version }}#subdirectory=robot-server" \
            "server_utils @ git+https://github.com/Opentrons/opentrons.git@v${{ matrix.opentrons-version }}#subdirectory=server-utils" \
            "opentrons_shared_data @ git+https://github.com/Opentrons/opentrons.git@v${{ matrix.opentrons-version }}#subdirectory=shared-data"
          uv pip install \
            "pydantic==2.11.7" \
            "sqlalchemy==1.4.51" \
            "paho-mqtt==1.6.1" \
            "wsproto==1.2.0" \
            "python-multipart==0.0.6" \
            "python-dotenv==1.0.1" \
            "fastapi==0.100.0" \
            "pydantic-settings==2.4.0" \
            "uvicorn==0.27.0.post1"

      - name: Integration tests (HTTP API + gRPC, simulator)
        run: uv run pytest tests/integration/ --with-http-server -v --junit-xml=junit-integration.xml

      - name: Upload integration test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: integration-results-${{ matrix.python-version }}
          path: junit-integration.xml
          retention-days: 7
