name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # Old OT-2: Python 3.10, opentrons 8.8.1 (Debian-based, glibc 2.25)
          - python-version: "3.10"
            opentrons-version: "8.8.1"
          # New OT-2: Python 3.12, opentrons 9.0.0 (Buildroot, glibc 2.40)
          - python-version: "3.12"
            opentrons-version: "9.0.0"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.9.6"
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies (opentrons ${{ matrix.opentrons-version }})
        run: |
          uv sync --all-extras
          if [ "${{ matrix.opentrons-version }}" != "8.8.1" ]; then
            uv pip install "opentrons==${{ matrix.opentrons-version }}"
          fi

      - name: Lint
        run: uv run ruff check src

      - name: Format
        run: uv run ruff format --check src

      - name: Test
        run: uv run pytest --cov=src --cov-report=term --cov-report=xml --junit-xml=junit.xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7
